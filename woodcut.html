    // ============================================================
    // LOAD ORDER (JSONP)
    // ============================================================
    let jsonpTimeout;
    function openLoadModal() { document.getElementById('loadOrderModal').style.display = 'flex'; }
    function closeLoadModal() { document.getElementById('loadOrderModal').style.display = 'none'; }
    function formatPhoneNumber(input) {
      let val = input.value.replace(/\D/g, '');
      if (val.length > 3 && val.length <= 7) val = val.slice(0, 3) + '-' + val.slice(3);
      else if (val.length > 7) val = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7, 11);
      input.value = val;
    }
    function confirmLoadOrder() {
      const phone = document.getElementById('load-phone').value.trim();
      const orderNo = document.getElementById('load-orderNo').value.trim();
      if (!phone || !orderNo) { alert('휴대폰 번호와 주문번호를 모두 입력해주세요.'); return; }
      const btn = document.getElementById('loadOrderConfirmBtn');
      btn.disabled = true; btn.textContent = '불러오는 중...';
      const old = document.getElementById('jsonp_script'); if (old) old.remove();
      jsonpTimeout = setTimeout(() => { if (btn.disabled) { alert('요청 시간이 초과되었습니다.'); btn.disabled = false; btn.textContent = '확인'; } }, 15000);
      const script = document.createElement('script');
      script.id = 'jsonp_script';
      script.src = `${API_URL}?callback=handleOrderDataResponse&phone=${encodeURIComponent(phone)}&orderNo=${encodeURIComponent(orderNo)}`;
      script.onerror = () => { clearTimeout(jsonpTimeout); alert('데이터를 불러오는 데 실패했습니다.'); btn.disabled = false; btn.textContent = '확인'; };
      document.head.appendChild(script);
    }
    function handleOrderDataResponse(result) {
      clearTimeout(jsonpTimeout);
      const btn = document.getElementById('loadOrderConfirmBtn');
      btn.disabled = false; btn.textContent = '확인';
      if (result.result === 'success' && result.data && result.data.length > 0) {
        orderList = [];
        result.data.forEach(row => {
          const summary = String(row['품명'] || row['주문내역 요약'] || '');
          const estimate = parseFloat(row['합계']) || 0;
          const processing = row['가공상세'] || row['가공'] || '';
          if (summary === '총 합계') return;
          let item = { isLoaded: true, estimate };
          if (summary === '[이벤트 할인]') { item.type = 'discount'; item.name = processing || '이벤트 할인'; item.woodName = '할인'; }
          else if (summary === '예상 배송비') { item.type = 'shipping'; item.name = processing || '배송비'; item.woodName = '배송'; item.quantity = row['수량']; }
          else if (summary.startsWith('[부자재]')) { item.type = 'accessory'; item.name = summary.replace('[부자재] ', ''); item.woodName = '[부자재]'; item.quantity = row['수량']; }
          else {
            item.woodTypeValue = summary; item.woodName = summary;
            item.width = row['폭(mm)'] || row['폭'] || 0; item.length = row['길이(mm)'] || row['길이'] || 0;
            item.quantity = row['수량'] || 1;
            item.processingSummary = processing || '가공 없음';
            item.selectedProcs = []; item.procDetails = {}; item.discount = 0; item.discountDetails = [];
          }
          orderList.push(item);
        });
        saveOrders(); updateOrderBadge();
        renderOrderPanel(true); // 읽기 전용으로 렌더링
        toggleOrderPanel(true); // 창 열기
        closeLoadModal();
        addBotMessage('✅ 주문 내역을 불러왔습니다. 불러온 데이터는 수정이 불가능하며, 조회용으로만 사용됩니다.');
        document.getElementById('load-phone').value = ''; document.getElementById('load-orderNo').value = '';
      } else { alert('일치하는 주문 내역을 찾을 수 없습니다.'); }
    }


    // ============================================================
    // ENHANCED submitOrder with progress modal
    // ============================================================
    submitOrder = async function () {
      const name = document.getElementById('custName').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const email = document.getElementById('custEmail')?.value.trim() || '';

      if (!name || !phone) { addBotMessage('성함과 연락처는 필수입니다.'); return; }
      const phoneRegex = /^010-\d{4}-\d{4}$/;
      if (!phoneRegex.test(phone)) { addBotMessage('휴대폰 번호를 010-0000-0000 형식으로 입력해주세요.'); return; }

      showProgressModal();
      updateStatus('주문 제출 중...', '');

      try {
        updateProgress(30, '견적서 이미지를 생성하고 있습니다...');

        // 견적서 이미지 캡처 (기존의 불안정한 modal 캡처 대신 전용 reportContainer 사용)
        const c = prepareReportContainer(orderList);
        const canvas = await html2canvas(c, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false
        });

        const quoteImage = canvas.toDataURL('image/jpeg', 0.8);

        updateProgress(60, '데이터를 서버에 저장하고 있습니다...');

        // 배송비 계산
        const shipItems = calculateShippingCost(orderList);
        let shipTotal = 0;
        shipItems.forEach(si => shipTotal += (si.cost * si.count));

        // 아이템 소계
        let itemTotal = 0;
        orderList.forEach(i => { itemTotal += i.estimate; });

        const grandTotal = itemTotal + shipTotal;

        // 서버 전송 데이터 구성
        const orderPayload = {
          type: 'order',
          data: {
            customer: { name, phone, email, memo: '' },
            orders: orderList,
            shippingItems: shipItems,
            shippingCost: shipTotal,
            totalPrice: grandTotal,
            quoteImage: quoteImage, // 이미지 데이터 추가
            sessionId: SESSION_ID,
            timestamp: new Date().toISOString()
          }
        };

        const resp = await postToServer(orderPayload);

        if (resp.result === 'success' || resp.orderNumber || resp.orderNo) {
          const on = resp.orderNo || resp.orderNumber || resp.data?.orderNumber || 'IRN-' + Date.now();

          showProgressSuccess('견적이 성공적으로 전송되었습니다!');
          setTimeout(() => {
            hideProgressModal();
            updateSubmitOrderSuccess(on, grandTotal);
            openInstructionsModal(on, grandTotal);
          }, 2000);

          lastSubmittedOrders = [...orderList]; // 백업 저장
          orderList = [];
          saveOrders();
          updateOrderBadge();
          renderOrderPanel();
          updateStatus('주문 완료', on);
        } else {
          showProgressError('서버 전송 중 오류가 발생했습니다: ' + (resp.message || ''));
          updateStatus('주문 실패', '');
        }
      } catch (e) {
        showProgressError('전송 중 네트워크 오류가 발생했습니다.');
        updateStatus('연결 오류', '');
        console.error(e);
      }
    };

    // Modal dismiss on overlay click
    window.addEventListener('click', (e) => {
      if (e.target.id === 'loadOrderModal') closeLoadModal();
      if (e.target.id === 'videoModal') closeVideoModal();
    });
  </script>

        <iframe id="youtubeVideo" style="position:absolute;top:0;left:0;width:100%;height:100%;" src="" frameborder="0"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- LOAD ORDER MODAL -->
  <div id="loadOrderModal" class="modal-overlay">
    <div class="modal-content" style="text-align:left;">
      <span class="modal-close" onclick="closeLoadModal()">&times;</span>
      <div class="modal-title">주문 내역 불러오기</div>
      <div class="form-row"><label>휴대폰</label><input type="tel" id="load-phone" placeholder="010-1234-5678"></div>
      <div class="form-row"><label>주문번호</label><input type="text" id="load-orderNo" placeholder="예: 20240718-001"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn-checkout" style="background:linear-gradient(135deg,#3498db,#2980b9);"
          id="loadOrderConfirmBtn" onclick="confirmLoadOrder()">확인</button>
        <button class="btn-checkout" style="background:#7f8c8d;" onclick="closeLoadModal()">취소</button>
      </div>
    </div>
  </div>

  <div id="reportContainer"></div>
</body>

</html>
